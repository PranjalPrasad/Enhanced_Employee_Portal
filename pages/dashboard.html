    /* Emergency fix for collapse button */

    /* Ensure collapse works */

    .sidebar.collapsed .logo-text,

    }

    .nav-link.active { background: var(--sidebar-active); color: #fff; }

    
    .logo-text { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 15px; white-space: nowrap; }

      align-items: center; transition: background 0.2s;

    .collapse-btn:hover { background: var(--sidebar-hover); color: #fff; }
    .sidebar.collapsed .collapse-btn i { transform: rotate(180deg); }


</style>

   <script>
  document.addEventListener('DOMContentLoaded', function () {
    const firstName = localStorage.getItem('hrms_first_name') || '';
    const lastName  = localStorage.getItem('hrms_last_name')  || '';
    const fullName  = (firstName + ' ' + lastName).trim() || 'Employee';
    const designation = localStorage.getItem('hrms_designation') || '';
    const department  = localStorage.getItem('hrms_department')  || '';

    const initials = [firstName, lastName]
      .filter(Boolean).map(n => n[0]).join('').toUpperCase() || 'E';

    const role = designation || department || 'Employee';

    const avatarEl = document.getElementById('userAvatar');
    if (avatarEl) avatarEl.innerText = initials;

    const userNameEl = document.getElementById('userName');
    if (userNameEl) userNameEl.innerText = fullName;

    const userRoleEl = document.getElementById('userRole');
    if (userRoleEl) userRoleEl.innerText = role;

    const dashNameEl = document.getElementById('dashboardUserName');
    if (dashNameEl) dashNameEl.innerText = firstName || fullName;

    const greetingEl = document.getElementById('greetingMessage');
    if (greetingEl) {
      const h = new Date().getHours();
      const g = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
      greetingEl.innerText = g + "! Here's your dashboard overview.";
    }
  });


  // ============================================================
// SIDEBAR COLLAPSE / TOGGLE FUNCTIONALITY
// ============================================================

document.addEventListener('DOMContentLoaded', function () {
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    const collapseBtn = document.getElementById('collapseSidebarBtn');
    const mobileToggleBtn = document.getElementById('mobileToggleBtn');

    // --- Load saved state from localStorage ---
    const savedState = localStorage.getItem('sidebarCollapsed');
    if (savedState === 'true') {
        sidebar.classList.add('collapsed');
        mainContent.classList.add('sidebar-collapsed');
        // Rotate icon if needed
        const icon = collapseBtn?.querySelector('i');
        if (icon) icon.style.transform = 'rotate(180deg)';
    }

    // --- Collapse/Expand on button click ---
    if (collapseBtn) {
        collapseBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('sidebar-collapsed');

            // Rotate chevron icon
            const icon = this.querySelector('i');
            if (icon) {
                if (sidebar.classList.contains('collapsed')) {
                    icon.style.transform = 'rotate(180deg)';
                } else {
                    icon.style.transform = 'rotate(0deg)';
                }
            }

            // Save state
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        });
    }

    // --- Mobile toggle (hamburger) ---
    if (mobileToggleBtn) {
        mobileToggleBtn.addEventListener('click', function () {
            sidebar.classList.toggle('mobile-open');
        });
    }

    // --- Close sidebar on outside click (mobile) ---
    document.addEventListener('click', function (e) {
        if (window.innerWidth <= 768) {
            if (!sidebar.contains(e.target) && !mobileToggleBtn?.contains(e.target)) {
                sidebar.classList.remove('mobile-open');
            }
        }
    });

    // --- Optional: Keyboard shortcut (Ctrl + B) ---
    document.addEventListener('keydown', function (e) {
        if (e.ctrlKey && e.key === 'b') {
            e.preventDefault();
            collapseBtn?.click();
        }
    });
});



</script>

         },
