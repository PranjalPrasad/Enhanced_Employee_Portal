<!-- ═══════════════════════════════════════════════════════════════
     JAVASCRIPT  –  single DOMContentLoaded module, no bare globals
════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ─── Pre-flight: guard against missing jsPDF ───────────────── */
window.__payrollReady = false;

document.addEventListener('DOMContentLoaded', function () {

  /* ══════════════════════════════════════════════════════════════
     CONSTANTS
  ══════════════════════════════════════════════════════════════ */
  var BASE_URL  = 'http://localhost:8086';
  var MONTH_MAP = {
    JANUARY:'January', FEBRUARY:'February', MARCH:'March',    APRIL:'April',
    MAY:'May',         JUNE:'June',          JULY:'July',      AUGUST:'August',
    SEPTEMBER:'September', OCTOBER:'October', NOVEMBER:'November', DECEMBER:'December'
  };

  /* ══════════════════════════════════════════════════════════════
     STATE
  ══════════════════════════════════════════════════════════════ */
  var allPayslips      = [];
  var filteredPayslips = [];
  var currentSlip      = null;
  var logoBase64       = null;   // cached once after first successful fetch

  /* ══════════════════════════════════════════════════════════════
     UTILITIES
  ══════════════════════════════════════════════════════════════ */

  /** Safe number: converts null / undefined / NaN → 0 */
  function n(v) { return (v === null || v === undefined || isNaN(v)) ? 0 : parseFloat(v); }

  /** Format number as Indian locale string (no symbol) */
  function fmtNum(v) { return n(v).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

  /** Format for HTML display with ₹ symbol */
  function fmtINR(v) { return '\u20B9' + fmtNum(v); }

  /** Format for PDF display (helvetica can't render ₹) */
  function fmtPDF(v) { return 'Rs. ' + fmtNum(v); }

  function formatDate(iso) {
    if (!iso) return 'N/A';
    try { return new Date(iso).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }); }
    catch(e) { return 'N/A'; }
  }

  function statusBadgeClass(status) {
    switch ((status || '').toUpperCase()) {
      case 'PAID':       return 'bg-green-100 text-green-700';
      case 'PROCESSED':  return 'bg-blue-100 text-blue-700';
      case 'PROCESSING': return 'bg-yellow-100 text-yellow-700';
      case 'DRAFT':      return 'bg-slate-100 text-slate-600';
      case 'FAILED':     return 'bg-red-100 text-red-600';
      case 'CANCELLED':  return 'bg-orange-100 text-orange-600';
      default:           return 'bg-slate-100 text-slate-600';
    }
  }

  function numberToWords(num) {
    var a = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten',
             'Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen',
             'Eighteen','Nineteen'];
    var b = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
    function iW(n) {
      if (n < 20)       return a[n];
      if (n < 100)      return b[Math.floor(n/10)] + (n%10 ? ' '+a[n%10] : '');
      if (n < 1000)     return a[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' '+iW(n%100) : '');
      if (n < 100000)   return iW(Math.floor(n/1000)) + ' Thousand' + (n%1000 ? ' '+iW(n%1000) : '');
      if (n < 10000000) return iW(Math.floor(n/100000)) + ' Lakh' + (n%100000 ? ' '+iW(n%100000) : '');
      return iW(Math.floor(n/10000000)) + ' Crore' + (n%10000000 ? ' '+iW(n%10000000) : '');
    }
    return iW(Math.round(num)) + ' Rupees Only';
  }

  function showToast(msg, type) {
    var bg = type === 'success' ? '#6faf2e' : type === 'error' ? '#e56c6c' : '#1f6f7f';
    Toastify({ text: msg, duration: 3500, gravity: 'bottom', position: 'right',
      backgroundColor: bg,
      style: { borderRadius:'10px', padding:'12px 16px', fontSize:'14px', fontWeight:'500' }
    }).showToast();
  }

  /* ══════════════════════════════════════════════════════════════
     LOGO  –  fetch once as base64 for both modal and PDF
     Uses a canvas to convert HTMLImageElement → base64 string.
     If the image fails, logoBase64 stays null (handled gracefully).
  ══════════════════════════════════════════════════════════════ */
  function preloadLogo() {
    return new Promise(function(resolve) {
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function() {
        try {
          var canvas = document.createElement('canvas');
          canvas.width  = img.naturalWidth  || img.width;
          canvas.height = img.naturalHeight || img.height;
          canvas.getContext('2d').drawImage(img, 0, 0);
          logoBase64 = canvas.toDataURL('image/png');
        } catch(e) {
          logoBase64 = null;   // CORS or taint – degrade gracefully
        }
        resolve();
      };
      img.onerror = function() { logoBase64 = null; resolve(); };
      img.src = '/Images/logo.png?_cb=' + Date.now();   // bust cache
    });
  }

  /* ══════════════════════════════════════════════════════════════
     HEADER
  ══════════════════════════════════════════════════════════════ */
  function initHeader() {
    var fn  = localStorage.getItem('hrms_first_name')  || '';
    var ln  = localStorage.getItem('hrms_last_name')   || '';
    var des = localStorage.getItem('hrms_designation') || '';
    var dep = localStorage.getItem('hrms_department')  || '';
    var fullName = (fn + ' ' + ln).trim() || 'Employee';
    var initials = ([fn,ln].filter(Boolean).map(function(x){return x[0];}).join('') || 'E').toUpperCase();
    document.getElementById('userAvatar').textContent = initials;
    document.getElementById('userName').textContent   = fullName;
    document.getElementById('userRole').textContent   = des || dep || 'Employee';
  }

  /* ══════════════════════════════════════════════════════════════
     API
  ══════════════════════════════════════════════════════════════ */
  function loadPayslips() {
    var empId = localStorage.getItem('hrms_employee_id') || '';
    fetch(BASE_URL + '/api/v1/payroll/employee-payroll/' + empId)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(json) {
        if (!json.success) throw new Error(json.message || 'API error');
        allPayslips = json.data || [];
        populateYearFilter();
        applyFilters();
      })
      .catch(function(err) {
        console.error('[Payroll]', err);
        showToast('Could not load payslips. Please try again.', 'error');
        document.getElementById('payslipGrid').innerHTML = '';
        var es = document.getElementById('emptyState');
        es.classList.remove('hidden');
        es.classList.add('flex');
      });
  }

  /* ══════════════════════════════════════════════════════════════
     FILTERS
  ══════════════════════════════════════════════════════════════ */
  function populateYearFilter() {
    var years = [];
    allPayslips.forEach(function(p) {
      if (years.indexOf(p.payrollYear) === -1) years.push(p.payrollYear);
    });
    years.sort(function(a,b){return b-a;});
    var sel = document.getElementById('yearFilter');
    years.forEach(function(y) {
      var o = document.createElement('option');
      o.value = y; o.text = y;
      sel.appendChild(o);
    });
  }

  function applyFilters() {
    var month = document.getElementById('monthFilter').value;
    var year  = document.getElementById('yearFilter').value;
    filteredPayslips = allPayslips.filter(function(p) {
      return (!month || p.payrollMonth === month) &&
             (!year  || String(p.payrollYear) === year);
    });
    var label = ([month ? MONTH_MAP[month] : '', year].filter(Boolean).join(' ')) || 'All Records';
    document.getElementById('filterLabel').textContent = label;

    /* Show reset button only when at least one filter is active */
    var resetBtn = document.getElementById('resetFilterBtn');
    if (month || year) {
      resetBtn.classList.remove('hidden');
      resetBtn.classList.add('flex');
    } else {
      resetBtn.classList.add('hidden');
      resetBtn.classList.remove('flex');
    }

    renderCards();
  }

  document.getElementById('monthFilter').addEventListener('change', applyFilters);
  document.getElementById('yearFilter').addEventListener('change', applyFilters);

  document.getElementById('resetFilterBtn').addEventListener('click', function() {
    document.getElementById('monthFilter').value = '';
    document.getElementById('yearFilter').value  = '';
    applyFilters();
  });

  /* ══════════════════════════════════════════════════════════════
     CARDS
  ══════════════════════════════════════════════════════════════ */
  function renderCards() {
    var grid  = document.getElementById('payslipGrid');
    var empty = document.getElementById('emptyState');

    if (!filteredPayslips.length) {
      grid.innerHTML = '';
      empty.classList.remove('hidden'); empty.classList.add('flex');
      return;
    }
    empty.classList.add('hidden'); empty.classList.remove('flex');

    grid.innerHTML = filteredPayslips.map(function(slip, idx) {
      var ml   = MONTH_MAP[slip.payrollMonth] || slip.payrollMonth;
      var sc   = statusBadgeClass(slip.status);
      return '<div class="flex flex-col gap-4 p-5 transition-all duration-200 bg-white border border-[#20879bcb] cursor-pointer payslip-card rounded-2xl hover:-translate-y-1 hover:shadow-lg hover:border-primary/40" onclick="window.__openPayslip(' + idx + ')">'
        + '<div class="flex items-start justify-between">'
        +   '<div>'
        +     '<div class="text-base font-semibold font-display text-heading">' + ml + ' ' + slip.payrollYear + '</div>'
        +     '<div class="text-xs text-muted mt-0.5">' + (slip.designation||'') + ' &bull; ' + (slip.department||'') + '</div>'
        +   '</div>'
        +   '<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[11px] font-semibold ' + sc + '">'
        +     '<i class="fas fa-circle text-[6px]"></i> ' + slip.status
        +   '</span>'
        + '</div>'
        + '<div>'
        +   '<div class="text-xs text-muted mb-0.5">Net Pay</div>'
        +   '<div class="text-2xl font-bold font-display text-primary-dk">' + fmtINR(n(slip.netSalary)) + '</div>'
        + '</div>'
        + '<div class="grid grid-cols-3 gap-2 p-3 border border-gray-400 bg-slate-50 rounded-xl">'
        +   '<div class="text-center"><div class="text-[11px] text-muted">Gross</div><div class="text-sm font-semibold text-success">' + fmtINR(n(slip.grossSalary)) + '</div></div>'
        +   '<div class="text-center border-x border-[#20879bcb]"><div class="text-[11px] text-muted">Deductions</div><div class="text-sm font-semibold text-danger">-' + fmtINR(n(slip.totalDeductions)) + '</div></div>'
        +   '<div class="text-center"><div class="text-[11px] text-muted">Net</div><div class="text-sm font-semibold text-primary">' + fmtINR(n(slip.netSalary)) + '</div></div>'
        + '</div>'
        + '<div class="flex gap-2 pt-1 border-t border-border">'
        +   '<button onclick="event.stopPropagation();window.__openPayslip(' + idx + ')" class="flex items-center justify-center flex-1 gap-2 py-2 text-xs font-semibold transition-colors border cursor-pointer rounded-xl text-primary bg-primary-lt border-primary/20 hover:bg-primary/10"><i class="fas fa-eye"></i> View</button>'
        +   '<button onclick="event.stopPropagation();window.__downloadPDF(' + idx + ')" class="flex-1 flex items-center justify-center gap-2 py-2 rounded-xl text-xs font-semibold text-white transition-all hover:-translate-y-0.5 hover:shadow-md cursor-pointer border-none" style="background:linear-gradient(135deg,#1f6f7f,#145c6b)"><i class="fas fa-download"></i> Download</button>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  /* ══════════════════════════════════════════════════════════════
     PAYSLIP MODAL
  ══════════════════════════════════════════════════════════════ */

  /**
   * Build the 4-column merged table body.
   * earnings and deductions are arrays of [label, formattedValue].
   * We ALWAYS render all rows — no filtering on zero — so every
   * field is visible even when value is 0.00.
   */
  function buildTableBody(earnings, deductions) {
    var maxLen = Math.max(earnings.length, deductions.length);
    var rows = '';
    for (var i = 0; i < maxLen; i++) {
      var el = earnings[i]    ? '<td>' + earnings[i][0]    + '</td><td class="amt-col">' + earnings[i][1]    + '</td>'
                              : '<td></td><td class="amt-col"></td>';
      var dl = deductions[i]  ? '<td>' + deductions[i][0]  + '</td><td class="amt-col">' + deductions[i][1]  + '</td>'
                              : '<td></td><td class="amt-col"></td>';
      rows += '<tr>' + el + dl + '</tr>';
    }
    return rows;
  }

  function openModal(idx) {
    currentSlip = filteredPayslips[idx];
    var s = currentSlip;

    var ml       = MONTH_MAP[s.payrollMonth] || s.payrollMonth;
    var basic    = n(s.basicSalary);
    var hra      = n(s.hra);
    var allow    = n(s.allowances);
    var gross    = n(s.grossSalary);
    var empPf    = n(s.employeePf);    // null-safe via n()
    var emplrPf  = n(s.employerPf);    // null-safe via n()
    var esi      = n(s.esi);
    var tds      = n(s.tds);
    var totalDed = n(s.totalDeductions);
    var net      = n(s.netSalary);

    /* Always show all defined rows — even when 0.00 */
    var earnings = [
      ['Basic Salary',               '\u20B9 ' + fmtNum(basic)],
      ['House Rent Allowance (HRA)', '\u20B9 ' + fmtNum(hra)],
      ['Other Allowances',           '\u20B9 ' + fmtNum(allow)],
    ];
    var deductions = [
      ['Employee PF',      '\u20B9 ' + fmtNum(empPf)],
      ['Employer PF',      '\u20B9 ' + fmtNum(emplrPf)],
      ['ESI',              '\u20B9 ' + fmtNum(esi)],
      ['TDS / Income Tax', '\u20B9 ' + fmtNum(tds)],
    ];

    /* Logo: use cached base64 if available; fallback to icon */
    var logoHtml = logoBase64
      ? '<img src="' + logoBase64 + '" alt="Logo" style="width:100px;height:52px;object-fit:contain;border-radius:8px;background:#fff;padding:4px;flex-shrink:0;" />'
      : '<div style="width:52px;height:52px;background:#1f6f7f;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="fas fa-briefcase" style="color:#fff;font-size:22px;"></i></div>';

    var html =
      '<div id="payslipToPrint" class="payslip-container">'

      /* ── Company Header ── */
      + '<div class="ps-header">'
      +   '<div class="ps-company-row">'
      +     logoHtml
      +     '<div>'
      +       '<div class="ps-company-name">Sustainable Integrated Environmental Consultant.</div>'
      +       '<div class="ps-company-addr">Office-401, Sanskriti Arcade, Kaspate Wasti, Wakad, Pune \u2013 411057</div>'
      +     '</div>'
      +   '</div>'
      +   '<div class="ps-month-row">PAYSLIP FOR THE MONTH OF ' + ml.toUpperCase() + ' ' + s.payrollYear + '</div>'
      + '</div>'

      /* ── Employee Detail Grid (8 cells = 4 rows × 2 cols) ── */
      + '<div class="ps-emp-grid">'
      +   '<div class="ps-emp-cell"><span class="ps-emp-label">Employee Name</span><span class="ps-emp-value">' + (s.fullName   ||'N/A') + '</span></div>'
      +   '<div class="ps-emp-cell"><span class="ps-emp-label">Employee ID</span><span class="ps-emp-value">'   + (s.employeeId||'N/A') + '</span></div>'
      +   '<div class="ps-emp-cell"><span class="ps-emp-label">Designation</span><span class="ps-emp-value">'   + (s.designation||'N/A')+'</span></div>'
      +   '<div class="ps-emp-cell"><span class="ps-emp-label">Department</span><span class="ps-emp-value">'    + (s.department ||'N/A')+'</span></div>'
      +   '<div class="ps-emp-cell"><span class="ps-emp-label">Pay Period</span><span class="ps-emp-value">'    + ml + ' ' + s.payrollYear + '</span></div>'
      +   '<div class="ps-emp-cell"><span class="ps-emp-label">Status</span><span class="ps-emp-value">'        + (s.status     ||'N/A') + '</span></div>'
      +   '<div class="ps-emp-cell"><span class="ps-emp-label">Initiated By</span><span class="ps-emp-value">'  + (s.initiatedBy||'N/A') + '</span></div>'
      +   '<div class="ps-emp-cell"><span class="ps-emp-label">Pay Date</span><span class="ps-emp-value">'      + formatDate(s.updatedAt) + '</span></div>'
      + '</div>'

      /* ── Salary Table ── */
      + '<table class="ps-salary-table">'
      +   '<thead><tr>'
      +     '<th style="width:37%">Earnings</th><th class="amt-col" style="width:13%">Amount</th>'
      +     '<th style="width:37%">Deductions</th><th class="amt-col" style="width:13%">Amount</th>'
      +   '</tr></thead>'
      +   '<tbody>' + buildTableBody(earnings, deductions) + '</tbody>'
      +   '<tfoot><tr class="total-row">'
      +     '<td>Gross Earnings</td><td class="amt-col">\u20B9 ' + fmtNum(gross) + '</td>'
      +     '<td>Total Deductions</td><td class="amt-col">\u20B9 ' + fmtNum(totalDed) + '</td>'
      +   '</tr></tfoot>'
      + '</table>'

      /* ── Net Pay ── */
      + '<div class="ps-net-row">'
      +   '<div>'
      +     '<div class="ps-net-label">NET PAY (Take Home)</div>'
      +     '<div class="ps-net-words">' + numberToWords(net) + '</div>'
      +   '</div>'
      +   '<div class="ps-net-amount">\u20B9 ' + fmtNum(net) + '</div>'
      + '</div>'

      + '<div class="ps-footer">This is a Computer Generated Payslip and does not require a physical Signature.<br>For any discrepancies, please contact HR department within 7 days.</div>'
      + '</div>';

    document.getElementById('payslipDocContent').innerHTML = html;

    /* Show modal */
    var overlay = document.getElementById('modalOverlay');
    var box     = document.getElementById('modalBox');
    overlay.style.visibility = 'visible';
    overlay.classList.remove('opacity-0', 'invisible');
    overlay.classList.add('opacity-100');
    box.classList.remove('scale-95');
    box.classList.add('scale-100');
  }

  function closeModal() {
    var overlay = document.getElementById('modalOverlay');
    var box     = document.getElementById('modalBox');
    overlay.classList.remove('opacity-100');
    overlay.classList.add('opacity-0');
    box.classList.add('scale-95');
    box.classList.remove('scale-100');
    setTimeout(function() { overlay.style.visibility = 'hidden'; }, 280);
  }

  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  /* ══════════════════════════════════════════════════════════════
     PDF GENERATION
     Row height = 8mm (label 3mm + value 5mm = 8mm per row).
     Emp box: 4 rows × 8mm = 32mm + 4mm padding = 36mm.
     Column width split: (182 - 6) / 2 = 88mm each.
  ══════════════════════════════════════════════════════════════ */
  function generatePDF(slip) {
    if (!window.jspdf || !window.jspdf.jsPDF) {
      showToast('PDF library not ready. Please wait and try again.', 'error');
      return;
    }

    var s        = slip;
    var ml       = MONTH_MAP[s.payrollMonth] || s.payrollMonth;
    var basic    = n(s.basicSalary);
    var hra      = n(s.hra);
    var allow    = n(s.allowances);
    var gross    = n(s.grossSalary);
    var empPf    = n(s.employeePf);
    var emplrPf  = n(s.employerPf);
    var esi      = n(s.esi);
    var tds      = n(s.tds);
    var totalDed = n(s.totalDeductions);
    var net      = n(s.netSalary);

    var PRIMARY      = [31, 111, 127];
    var PRIMARY_DARK = [20, 92, 107];
    var SOFT         = [230, 244, 246];
    var TEXT         = [51,  65,  85];
    var MUTED        = [100, 116, 139];
    var W = 210, M = 14;
    var colW = (W - M*2 - 6) / 2;   // 88mm per column

    var doc = new window.jspdf.jsPDF({ unit:'mm', format:'a4' });

    /* ── 1. Header bar ── */
    doc.setFillColor.apply(doc, PRIMARY);
    doc.roundedRect(M, 10, W-M*2, 26, 4, 4, 'F');
    doc.setTextColor(255,255,255);

    /* Logo inside header (left) */
    if (logoBase64) {
      try { doc.addImage(logoBase64, 'PNG', M+2, 12, 20, 20); }
      catch(e) { /* ignore if image fails */ }
    }
    var textX = logoBase64 ? M+26 : M+6;

    doc.setFont('helvetica','bold'); doc.setFontSize(12);
    doc.text('Sustainable Integrated Environmental Consultant.', textX, 20);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
    doc.text('Office-401, Sanskriti Arcade, Kaspate Wasti, Wakad, Pune - 411057', textX, 27);
    doc.setFont('helvetica','bold'); doc.setFontSize(11);
    doc.text('PAYSLIP', W-M-6, 20, { align:'right' });
    doc.setFont('helvetica','normal'); doc.setFontSize(8);
    doc.text(ml + ' ' + s.payrollYear, W-M-6, 27, { align:'right' });

    var y = 42;

    /* ── 2. Employee Info grid ──
       8 fields, rendered as left col (4) + right col (4).
       Each row: label at y+rowH*i+3, value at y+rowH*i+8.
       rowH = 9mm, total box = 4*9 = 36mm + 2mm padding = 38mm */
    var ROW_H = 9;
    var BOX_H = 4 * ROW_H + 2;
    doc.setFillColor.apply(doc, SOFT);
    doc.roundedRect(M, y, W-M*2, BOX_H, 3, 3, 'F');

    var leftFields  = [
      ['Employee Name', s.fullName    || 'N/A'],
      ['Employee ID',   s.employeeId  || 'N/A'],
      ['Designation',   s.designation || 'N/A'],
      ['Department',    s.department  || 'N/A']
    ];
    var rightFields = [
      ['Pay Period',    ml + ' ' + s.payrollYear],
      ['Status',        s.status      || 'N/A'],
      ['Initiated By',  s.initiatedBy || 'N/A'],
      ['Pay Date',      formatDate(s.updatedAt)]
    ];

    leftFields.forEach(function(f, i) {
      doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor.apply(doc, MUTED);
      doc.text(f[0], M+4, y + 3 + i*ROW_H);
      doc.setFont('helvetica','bold');   doc.setFontSize(8.5); doc.setTextColor.apply(doc, TEXT);
      doc.text(String(f[1]), M+4, y + 8 + i*ROW_H);
    });
    var cx = W/2 + 4;
    rightFields.forEach(function(f, i) {
      doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor.apply(doc, MUTED);
      doc.text(f[0], cx, y + 3 + i*ROW_H);
      doc.setFont('helvetica','bold');   doc.setFontSize(8.5); doc.setTextColor.apply(doc, TEXT);
      doc.text(String(f[1]), cx, y + 8 + i*ROW_H);
    });

    y += BOX_H + 6;

    /* ── 3. Earnings / Deductions table ──
       Always render all rows (no zero-filter) so layout is stable. */
    var earningRows = [
      ['Basic Salary',    fmtPDF(basic)],
      ['HRA',             fmtPDF(hra)],
      ['Other Allowances',fmtPDF(allow)],
      ['Gross Earnings',  fmtPDF(gross)]      /* total row */
    ];
    var deductRows = [
      ['Employee PF',      fmtPDF(empPf)],
      ['Employer PF',      fmtPDF(emplrPf)],
      ['ESI',              fmtPDF(esi)],
      ['TDS / Income Tax', fmtPDF(tds)],
      ['Total Deductions', fmtPDF(totalDed)]  /* total row */
    ];

    /* Column headers */
    doc.setFillColor.apply(doc, PRIMARY);
    doc.roundedRect(M, y, colW, 8, 2, 2, 'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
    doc.text('Earnings', M+4, y+5.5);

    doc.setFillColor(229,108,108);
    doc.roundedRect(M+colW+6, y, colW, 8, 2, 2, 'F');
    doc.text('Deductions', M+colW+10, y+5.5);

    y += 10;

    var RH = 7;    /* row height in mm */
    var y2 = y;

    earningRows.forEach(function(row, i) {
      var isTotal = (i === earningRows.length - 1);
      if (isTotal) { doc.setFillColor.apply(doc, SOFT); doc.rect(M, y, colW, RH, 'F'); }
      doc.setFont('helvetica', isTotal?'bold':'normal');
      doc.setFontSize(isTotal?9:8.5); doc.setTextColor.apply(doc, TEXT);
      doc.text(row[0], M+3, y+5);
      doc.text(row[1], M+colW-3, y+5, { align:'right' });
      if (!isTotal) { doc.setDrawColor(226,232,240); doc.line(M, y+RH, M+colW, y+RH); }
      y += RH;
    });

    deductRows.forEach(function(row, i) {
      var isTotal = (i === deductRows.length - 1);
      if (isTotal) { doc.setFillColor.apply(doc, SOFT); doc.rect(M+colW+6, y2, colW, RH, 'F'); }
      doc.setFont('helvetica', isTotal?'bold':'normal');
      doc.setFontSize(isTotal?9:8.5); doc.setTextColor.apply(doc, TEXT);
      doc.text(row[0], M+colW+9, y2+5);
      doc.text(row[1], M+colW*2+3, y2+5, { align:'right' });
      if (!isTotal) { doc.setDrawColor(226,232,240); doc.line(M+colW+6, y2+RH, M+colW*2+6, y2+RH); }
      y2 += RH;
    });

    y = Math.max(y, y2) + 8;

    /* ── 4. Net Pay banner ── */
    doc.setFillColor.apply(doc, PRIMARY_DARK);
    doc.roundedRect(M, y, W-M*2, 22, 4, 4, 'F');
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    doc.text('NET PAY - ' + ml.toUpperCase() + ' ' + s.payrollYear, M+6, y+8);
    doc.setFont('helvetica','bold'); doc.setFontSize(18);
    doc.text(fmtPDF(net), M+6, y+18);
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
    doc.text('Gross: ' + fmtPDF(gross), W-M-52, y+10, { align:'left' });
    doc.text('Deductions: ' + fmtPDF(totalDed), W-M-52, y+17, { align:'left' });
    y += 28;

    /* ── 5. Amount in words ── */
    doc.setFillColor(248,250,252);
    doc.roundedRect(M, y, W-M*2, 12, 3, 3, 'F');
    doc.setTextColor.apply(doc, MUTED);
    doc.setFont('helvetica','normal'); doc.setFontSize(7);
    doc.text('Amount in Words:', M+4, y+5);
    doc.setTextColor.apply(doc, TEXT);
    doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.text(numberToWords(net), M+4, y+10);
    y += 18;

    /* ── 6. Footer ── */
    doc.setDrawColor.apply(doc, MUTED);
    doc.setLineDash([2,2]); doc.line(M, y, W-M, y); doc.setLineDash([]);
    y += 5;
    doc.setTextColor.apply(doc, MUTED);
    doc.setFont('helvetica','italic'); doc.setFontSize(7.5);
    doc.text('* This is a computer-generated payslip and does not require a physical signature.', M, y+4);
    doc.setFont('helvetica','bold'); doc.setFontSize(8);
    doc.text('Authorised Signatory', W-M-6, y+8, { align:'right' });
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor.apply(doc, MUTED);
    doc.text('Sustainable Integrated Environmental Consultant.', W-M-6, y+13, { align:'right' });
    doc.setFontSize(7);
    doc.text('Page 1 of 1  |  Generated on ' + new Date().toLocaleDateString('en-IN'), W/2, 290, { align:'center' });

    var fname = 'Payslip_' + (s.fullName||'Employee').replace(/\s+/g,'_') + '_' + ml + '_' + s.payrollYear + '.pdf';
    doc.save(fname);
    showToast('\u2713 ' + ml + ' ' + s.payrollYear + ' payslip downloaded!', 'success');
  }

  /* ── Download button on modal ── */
  document.getElementById('downloadPdfBtn').addEventListener('click', function() {
    if (currentSlip) generatePDF(currentSlip);
  });

  /* ══════════════════════════════════════════════════════════════
     GLOBAL BRIDGES  (called from inline onclick on card buttons)
     Defined INSIDE DOMContentLoaded so they close over the state.
  ══════════════════════════════════════════════════════════════ */
  window.__openPayslip = function(idx) { openModal(idx); };
  window.__downloadPDF = function(idx) {
    currentSlip = filteredPayslips[idx];
    generatePDF(currentSlip);
  };

  /* ══════════════════════════════════════════════════════════════
     SIDEBAR
  ══════════════════════════════════════════════════════════════ */
  var sidebar    = document.getElementById('sidebar');
  var mainCnt    = document.getElementById('mainContent');
  var pageHdr    = document.getElementById('pageHeader');
  var colIcon    = document.getElementById('collapseIcon');
  var mobileBtn  = document.getElementById('mobileToggleBtn');

  document.getElementById('collapseSidebarBtn').addEventListener('click', function() {
    var isCollapsed = sidebar.style.width === '80px';
    var w = isCollapsed ? '260px' : '80px';
    sidebar.style.width       = w;
    mainCnt.style.marginLeft  = w;
    pageHdr.style.left        = w;
    colIcon.style.transform   = isCollapsed ? '' : 'rotate(180deg)';
    sidebar.querySelectorAll('.nav-text,.logo-text').forEach(function(el) {
      el.style.display = isCollapsed ? '' : 'none';
    });
  });

  mobileBtn.addEventListener('click', function() {
    sidebar.classList.toggle('mobile-open');
  });

  document.addEventListener('click', function(e) {
    if (window.innerWidth < 768 && sidebar.classList.contains('mobile-open')
        && !sidebar.contains(e.target) && e.target !== mobileBtn) {
      sidebar.classList.remove('mobile-open');
    }
  });

  /* ══════════════════════════════════════════════════════════════
     PROFILE DROPDOWN
  ══════════════════════════════════════════════════════════════ */
  var profileBtn      = document.getElementById('profileDropdownBtn');
  var profileDropdown = document.getElementById('profileDropdown');

  profileBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    var isOpen = profileDropdown.classList.contains('opacity-100');
    if (isOpen) {
      profileDropdown.classList.add('opacity-0','invisible','-translate-y-2');
      profileDropdown.classList.remove('opacity-100','translate-y-0');
    } else {
      profileDropdown.classList.remove('opacity-0','invisible','-translate-y-2');
      profileDropdown.classList.add('opacity-100','translate-y-0');
    }
  });

  document.addEventListener('click', function() {
    profileDropdown.classList.add('opacity-0','invisible','-translate-y-2');
    profileDropdown.classList.remove('opacity-100','translate-y-0');
  });

  /* ══════════════════════════════════════════════════════════════
     LOGOUT
  ══════════════════════════════════════════════════════════════ */


  /* ══════════════════════════════════════════════════════════════
     BOOT  –  preload logo then start everything
  ══════════════════════════════════════════════════════════════ */
  initHeader();
  preloadLogo().then(function() {
    loadPayslips();
  });

}); /* end DOMContentLoaded */
</script>
</body>
</html>
